name: Trigger QAgent

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  trigger-qagent:
    runs-on: ubuntu-latest

    steps:
      - name: Disparar workflow no repo do agente
        env:
          QAGENT_PAT: ${{ secrets.QAGENT_PAT }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${QAGENT_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jrcosta/qagent/dispatches \
            -d '{
              "event_type":"analyze_target_repo",
              "client_payload":{
                "target_owner":"${{ github.repository_owner }}",
                "target_repo":"${{ github.event.repository.name }}",
                "target_ref":"${{ github.sha }}",
                "target_branch":"${{ github.ref_name }}",
                "base_sha":"${{ github.event.before }}",
                "head_sha":"${{ github.sha }}"
              }
            }'