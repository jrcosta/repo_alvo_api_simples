name: Forward PR comment to qagent

on:
  issue_comment:
    types: [created]

jobs:
  forward:
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.user.login, 'copilot')
    runs-on: ubuntu-latest

    steps:
      - name: Forward to qagent via repository_dispatch
        env:
          QAGENT_PAT: ${{ secrets.QAGENT_PAT }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          REPOSITORY_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          DISPATCH_PAYLOAD=$(jq -n \
            --arg body "$COMMENT_BODY" \
            --arg author "$COMMENT_AUTHOR" \
            --arg repo "$REPOSITORY_NAME" \
            --arg pr_number "$PR_NUMBER" \
            '{
              event_type:"pr_comment_created",
              client_payload:{
                comment_body:$body,
                author:$author,
                repo:$repo,
                pr_number:$pr_number
              }
            }')

          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $QAGENT_PAT" \
            "https://api.github.com/repos/jrcosta/qagent/dispatches" \
            -d "$DISPATCH_PAYLOAD"

          echo "✅ Forwarded comment to qagent"
