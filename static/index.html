<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repo Alvo API</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; }
    header { background: #16213e; color: #fff; padding: 1.2rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header .badge { background: #0f3460; padding: .25rem .7rem; border-radius: 12px; font-size: .75rem; }
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 10px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .card h2 { font-size: 1.05rem; margin-bottom: 1rem; color: #16213e; border-bottom: 2px solid #e2e8f0; padding-bottom: .5rem; }
    label { display: block; font-size: .8rem; font-weight: 600; margin-bottom: .3rem; color: #555; }
    input, button { font-size: .9rem; padding: .5rem .75rem; border-radius: 6px; border: 1px solid #cbd5e1; width: 100%; }
    input:focus { outline: none; border-color: #0f3460; box-shadow: 0 0 0 2px rgba(15,52,96,.15); }
    button { background: #16213e; color: #fff; border: none; cursor: pointer; margin-top: .75rem; font-weight: 600; transition: background .15s; }
    button:hover { background: #0f3460; }
    .btn-sm { width: auto; padding: .4rem 1rem; font-size: .8rem; margin-top: .5rem; }
    .result { margin-top: 1rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: .75rem; font-size: .82rem; max-height: 260px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .result:empty { display: none; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th, td { text-align: left; padding: .45rem .5rem; border-bottom: 1px solid #e2e8f0; }
    th { background: #f1f5f9; font-weight: 600; }
    .status { display: inline-block; padding: .15rem .5rem; border-radius: 8px; font-size: .75rem; font-weight: 600; }
    .status.ok { background: #d1fae5; color: #065f46; }
    .status.err { background: #fee2e2; color: #991b1b; }
    .row { display: flex; gap: .75rem; }
    .row > * { flex: 1; }
    .mt { margin-top: .75rem; }
    .full { grid-column: 1 / -1; }
  </style>
</head>
<body>

<header>
  <h1>📡 Repo Alvo API</h1>
  <span class="badge">Frontend</span>
  <span class="badge" id="health-badge">…</span>
</header>

<div class="container">
  <div class="grid">

    <!-- Health + Count -->
    <div class="card">
      <h2>🩺 Status &amp; Contagem</h2>
      <button class="btn-sm" onclick="checkHealth()">Verificar saúde</button>
      <button class="btn-sm" onclick="getCount()">Contar usuários</button>
      <div class="result" id="res-health"></div>
    </div>

    <!-- Create user -->
    <div class="card">
      <h2>➕ Criar Usuário</h2>
      <label for="c-name">Nome</label>
      <input id="c-name" placeholder="Maria Oliveira" />
      <label class="mt" for="c-email">Email</label>
      <input id="c-email" type="email" placeholder="maria@example.com" />
      <button onclick="createUser()">Criar</button>
      <div class="result" id="res-create"></div>
    </div>

    <!-- Search -->
    <div class="card">
      <h2>🔍 Buscar por Nome</h2>
      <label for="s-q">Termo</label>
      <input id="s-q" placeholder="Ana" />
      <button onclick="searchUsers()">Buscar</button>
      <div class="result" id="res-search"></div>
    </div>

    <!-- Get by ID -->
    <div class="card">
      <h2>👤 Buscar por ID</h2>
      <div class="row">
        <div>
          <label for="g-id">ID</label>
          <input id="g-id" type="number" placeholder="1" min="1" />
        </div>
      </div>
      <button onclick="getUser()">Buscar</button>
      <button class="btn-sm" onclick="getUserEmail()">Só email</button>
      <div class="result" id="res-get"></div>
    </div>

    <!-- Users list -->
    <div class="card full">
      <h2>📋 Listar Usuários</h2>
      <div class="row">
        <div><label for="l-limit">Limit</label><input id="l-limit" type="number" value="10" min="1" /></div>
        <div><label for="l-offset">Offset</label><input id="l-offset" type="number" value="0" min="0" /></div>
      </div>
      <button onclick="listUsers()">Listar</button>
      <div class="result" id="res-list"></div>
    </div>

  </div>
</div>

<script>
  const API = '';

  async function api(path, opts = {}) {
    const res = await fetch(API + path, opts);
    const data = await res.json();
    return { status: res.status, data };
  }

  function show(id, obj) {
    document.getElementById(id).textContent = JSON.stringify(obj, null, 2);
  }

  function renderTable(users) {
    if (!users.length) return '<em>Nenhum resultado.</em>';
    let h = '<table><tr><th>ID</th><th>Nome</th><th>Email</th></tr>';
    users.forEach(u => { h += `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td></tr>`; });
    h += '</table>';
    return h;
  }

  async function checkHealth() {
    const { status, data } = await api('/health');
    const badge = document.getElementById('health-badge');
    badge.textContent = status === 200 ? '● online' : '● offline';
    badge.className = 'badge status ' + (status === 200 ? 'ok' : 'err');
    show('res-health', data);
  }

  async function getCount() {
    const { data } = await api('/users/count');
    show('res-health', data);
  }

  async function createUser() {
    const name = document.getElementById('c-name').value.trim();
    const email = document.getElementById('c-email').value.trim();
    if (!name || !email) return show('res-create', { error: 'Preencha nome e email' });
    const { data } = await api('/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email })
    });
    show('res-create', data);
  }

  async function searchUsers() {
    const q = document.getElementById('s-q').value.trim();
    if (!q) return;
    const { data } = await api(`/users/search?q=${encodeURIComponent(q)}`);
    document.getElementById('res-search').innerHTML = renderTable(data);
  }

  async function getUser() {
    const id = document.getElementById('g-id').value;
    if (!id) return;
    const { data } = await api(`/users/${id}`);
    show('res-get', data);
  }

  async function getUserEmail() {
    const id = document.getElementById('g-id').value;
    if (!id) return;
    const { data } = await api(`/users/${id}/email`);
    show('res-get', data);
  }

  async function listUsers() {
    const limit = document.getElementById('l-limit').value || 10;
    const offset = document.getElementById('l-offset').value || 0;
    const { data } = await api(`/users?limit=${limit}&offset=${offset}`);
    document.getElementById('res-list').innerHTML = renderTable(data);
  }

  // Auto-check health on load
  checkHealth();
  listUsers();
</script>

</body>
</html>
